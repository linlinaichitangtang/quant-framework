# 开发环境覆盖配置
# 此文件用于本地开发，会自动覆盖 docker-compose.yml 中的配置
# 注意：此文件不应加入版本控制（已在 .gitignore 中）

version: '3.8'

services:
  backend:
    # 开发环境开启调试和卷挂载
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true

  frontend:
    # 开发环境使用 Vite 热更新
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

  db:
    # 开发环境暴露数据库端口方便外部连接
    ports:
      - "3306:3306"
