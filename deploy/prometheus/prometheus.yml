global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "quant-backend"
    static_configs:
      - targets: ["quant-backend:8000"]
    metrics_path: "/metrics"

  - job_name: "mysql"
    static_configs:
      - targets: ["quant-db:9104"]
