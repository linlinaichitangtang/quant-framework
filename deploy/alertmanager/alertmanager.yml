# Alertmanager 配置
# 部署前请替换所有 YOUR_* 占位符为实际值

global:
  # 企业微信配置（可选）
  # wechat_api_url: 'https://qyapi.weixin.qq.com/cgi-bin/'
  # wechat_corp_id: 'YOUR_CORP_ID'
  # wechat_agent_id: 'YOUR_AGENT_ID'
  # wechat_corp_secret: 'YOUR_CORP_SECRET'

  # 钉钉配置（可选）
  # dingtalk_api_url: 'https://oapi.dingtalk.com/robot/send'
  # dingtalk_access_token: 'YOUR_ACCESS_TOKEN'

  # 默认解析超时
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'web.hook'
  # 根据级别路由
  routes:
    - match_re:
        severity: critical
      receiver: 'critical_alerts'
    - match_re:
        severity: warning
      receiver: 'warning_alerts'

receivers:
  # Webhook接收器（支持飞书/企业微信/钉钉 webhook）
  # 部署时替换为实际的 webhook URL
  - name: 'web.hook'
    webhook_configs:
      - url: 'YOUR_WEBHOOK_URL'
        send_resolved: true

  # 企业微信接收严重告警
  # 部署时替换 corp_id / agent_id / api_secret
  - name: 'critical_alerts'
    wechat_configs:
      - corp_id: 'YOUR_CORP_ID'
        agent_id: 'YOUR_AGENT_ID'
        api_secret: 'YOUR_SECRET'
        to_user: '@all'
        message: '{{ template "wechat.default.message" . }}'

  # 默认警告接收
  - name: 'warning_alerts'
    wechat_configs:
      - corp_id: 'YOUR_CORP_ID'
        agent_id: 'YOUR_AGENT_ID'
        api_secret: 'YOUR_SECRET'
        to_user: '@all'
        message: '{{ template "wechat.default.message" . }}'

# 告警模板文件（可选）
# 如需自定义模板，请在 deploy/alertmanager/templates/ 下创建 .tmpl 文件
templates:
  - '/etc/alertmanager/templates/*.tmpl'
