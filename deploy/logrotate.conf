# OpenClaw量化框架日志轮转配置

# 后端应用日志
/path/to/quant-framework/logs/*.log {
    # 每天轮转一次
    daily
    # 保留30天日志
    rotate 30
    # 压缩旧日志
    compress
    # 延迟压缩，下次轮转再压缩
    delaycompress
    # 日志文件不存在也不报错
    missingok
    # 不创建空日志
    notifempty
    # 创建新日志文件
    create 0640 app app
    # 使用systemctl reload进行日志切割后不重启服务
    sharedscripts
    postrotate
        # 如果使用docker，不需要reload，docker会处理
        # 如果是直接部署，取消下面注释
        # systemctl reload quant-backend > /dev/null 2>&1 || true
    endscript
}

# Docker容器日志（如果需要单独配置）
/var/lib/docker/containers/*/*.log {
    hourly
    rotate 24
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
